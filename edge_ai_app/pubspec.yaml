name: edge_ai_app
description: EdgeMind AI - 完全离线、跨平台、低延迟的端侧大模型对话应用
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.0
  path_provider: ^2.1.3
  sqflite: ^2.3.0
  http: ^1.1.0
  provider: ^6.1.2
  cupertino_icons: ^1.0.6
  # 网络请求 (模型下载)
  dio: ^5.4.3+1
  # 文件选择 (外部导入)
  file_picker: ^8.0.7
  # 权限处理 (安卓存储权限)
  permission_handler: ^11.3.1
  # 本地存储 (记录默认模型)
  shared_preferences: ^2.2.3
  # 文件名处理
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  ffigen: ^9.0.0
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/icons/

ffigen:
  name: LlamaFFI
  description: FFI bindings for llama.cpp
  output: 'lib/core/engine/llama_ffi.g.dart'
  headers:
    entry-points:
      - 'native/llama_wrapper.h'
  functions:
    include:
      - 'edge_llama.*'
  structs:
    include:
      - 'EdgeContext'
